<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800">
  <title>TRMNL Preview — upgrade — 3 agents</title>
  <link rel="stylesheet" href="https://trmnl.com/css/latest/plugins.css">
  <script src="https://trmnl.com/js/latest/plugins.js"></script>
  <style>
    /* ── Base viewport ── */
    html, body {
      margin: 0;
      padding: 0;
      width: 800px;
      height: 480px;
      overflow: hidden;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #000;
    }

    /* ── Screen / View / Layout (TRMNL structure) ── */
    .screen {
      width: 800px;
      height: 480px;
      position: relative;
    }
    .view {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
      overflow: hidden;
    }
    .layout--col { flex-direction: column; }
    .layout--row { flex-direction: row; }

    /* ── Grid system ── */
    .grid {
      display: grid;
      gap: 8px;
    }
    .grid--cols-1 { grid-template-columns: 1fr; }
    .grid--cols-2 { grid-template-columns: 1fr 1fr; }
    .grid--cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .grid--cols-4 { grid-template-columns: repeat(4, 1fr); }
    .col { display: flex; flex-direction: column; }

    /* ── Flex system ── */
    .flex { display: flex; }
    .flex--row { flex-direction: row; }
    .flex--col { flex-direction: column; }

    /* ── Title system ── */
    .title {
      font-weight: 700;
      font-size: 16px;
      line-height: 1.2;
    }
    .title--small { font-size: 14px; }
    .title--base { font-size: 16px; }
    .title--large { font-size: 20px; }
    .title--xlarge { font-size: 24px; }

    /* ── Label system ── */
    .label {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.3;
    }
    .label--small { font-size: 11px; }
    .label--large { font-size: 15px; }
    .label--gray { color: #666; }
    .label--inverted {
      background: #000;
      color: #fff;
      border-radius: 3px;
      padding: 1px 6px;
      display: inline-block;
    }
    .label--outline {
      border: 1px solid #000;
      border-radius: 3px;
      padding: 1px 6px;
      display: inline-block;
    }

    /* ── Title bar ── */
    .title_bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      border-top: 1px solid #ccc;
      font-size: 12px;
    }
    .title_bar .title {
      font-size: 12px;
      font-weight: 600;
    }
    .title_bar .instance {
      font-size: 11px;
      color: #888;
    }

    /* ── Data-clamp (text overflow) ── */
    [data-clamp="1"] {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    [data-clamp="2"] {
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
  </style>
</head>
<body>

</body>
</html>
